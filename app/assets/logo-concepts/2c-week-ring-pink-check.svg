<?xml version="1.0" encoding="UTF-8"?>
<!-- Koncept 2c: Originalets indigo→lila-ring, men med rosa V/bock i mitten
     som enda accent. Ringen håller lugn indigo-violet-känsla, bocken sticker ut
     i rosa och drar blicken till mitten. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg2c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <!-- Bock i solid full färgstyrka — appens primära purple-600. -->
    <linearGradient id="checkPink2c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg2c)"/>

  <!-- 7 ring-segment — identisk indigo→lila-skala som koncept 2. -->
  <g fill="none" stroke-width="96" stroke-linecap="butt">
    <circle cx="512" cy="512" r="320" stroke="#4f46e5"
            stroke-dasharray="195 1815" stroke-dashoffset="0"
            transform="rotate(-90 512 512)"/>
    <circle cx="512" cy="512" r="320" stroke="#5d4ee6"
            stroke-dasharray="195 1815" stroke-dashoffset="-204"
            transform="rotate(-90 512 512)"/>
    <circle cx="512" cy="512" r="320" stroke="#6d57e7"
            stroke-dasharray="195 1815" stroke-dashoffset="-408"
            transform="rotate(-90 512 512)"/>
    <circle cx="512" cy="512" r="320" stroke="#7c63eb"
            stroke-dasharray="195 1815" stroke-dashoffset="-612"
            transform="rotate(-90 512 512)"/>
    <circle cx="512" cy="512" r="320" stroke="#8b6fee"
            stroke-dasharray="195 1815" stroke-dashoffset="-816"
            transform="rotate(-90 512 512)"/>
    <circle cx="512" cy="512" r="320" stroke="#a78bfa"
            stroke-dasharray="195 1815" stroke-dashoffset="-1020"
            transform="rotate(-90 512 512)"/>
    <circle cx="512" cy="512" r="320" stroke="#c4b5fd"
            stroke-dasharray="195 1815" stroke-dashoffset="-1224"
            transform="rotate(-90 512 512)"/>
  </g>

  <!-- Rosa V/checkmark i mitten — accent som drar blicken. -->
  <path d="M 380 460 L 480 600 L 660 380"
        stroke="url(#checkPink2c)" stroke-width="56"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
