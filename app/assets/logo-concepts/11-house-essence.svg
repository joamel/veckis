           Q 152 900 152 844
           L 152 460
           L 108 460
           Z"
        fill="none" stroke="#5C7F66" stroke-width="30" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Stort rött hjärta -->
  <path d="M 512 730
           C 488 699 372 625 372 545
           C 372 493 414 465 456 477
           C 482 484 501 505 512 531
           C 523 505 542 484 568 477
