<!-- Koncept 11: Essensen av "Rummen" utan rummen — samma huskontur med
     takfotsöverhäng + skorsten, honungsrök ("någon är hemma, det lagas mat")
     och ETT stort rött hjärta. Tre element, noll plotter. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect x="0" y="0" width="1024" height="1024" rx="192" ry="192" fill="#FAF7F0"/>

  <!-- Rök ovanför skorstenen (honung) -->
  <g stroke="#C29130" stroke-width="18" stroke-linecap="round" fill="none">
    <path d="M 698 142 Q 682 114 698 86 Q 714 58 698 30"/>
    <path d="M 738 142 Q 724 118 738 94 Q 752 70 738 46"/>
  </g>

  <!-- Huskontur med takfotsöverhäng + skorsten -->
  <path d="M 108 424
           L 512 132
           L 676 250
           L 676 172
           L 752 172
           L 752 305
           L 916 424
           L 916 460
           L 872 460
