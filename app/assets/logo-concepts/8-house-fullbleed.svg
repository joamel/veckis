<?xml version="1.0" encoding="UTF-8"?>
<!-- Koncept 8: FULL-BLEED — huset ÄR ikonen. Taklinjen skär över hela ytan,
     husväggen fyller allt nedanför; krämvit himmel bara i övre hörnen.
     Urskuret hjärt-fönster + stor bock-dörr. Skorsten med matånga i himlen. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf5ea"/>
      <stop offset="100%" stop-color="#f1e6d2"/>
    </linearGradient>
    <clipPath id="rr8"><rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/></clipPath>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg8)"/>

  <g clip-path="url(#rr8)">
    <!-- Matånga (terrakotta) i himlen -->
    <path d="M 760 232 Q 730 190 760 150 Q 790 110 760 68"
          stroke="#b96a45" stroke-width="34" stroke-linecap="round" fill="none"/>

    <!-- Skorsten som sticker upp genom taket -->
    <rect x="704" y="270" width="112" height="240" rx="22" fill="#4e7a5e"/>

    <!-- Husvägg: taklinje kant-till-kant, väggen fyller allt nedanför.
         Hjärt-fönstret urskuret (evenodd). -->
    <path fill-rule="evenodd" fill="#4e7a5e"
          d="M -40 452
             L 512 120
             L 1064 452
             L 1064 1064
             L -40 1064
             Z
             M 512 634
             C 494 614 428 578 428 534
             C 428 490 472 478 512 514
             C 552 478 596 490 596 534
             C 596 578 530 614 512 634 Z"/>

    <!-- Dörr = stor bock (vit) -->
    <path d="M 392 826 L 478 908 L 636 738" stroke="#fff" stroke-width="54"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
