<?xml version="1.0" encoding="UTF-8"?>
<!-- Koncept 3: Playful, rundat V i lila med grön bock-streck under. Varmare, mer familj. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="vfill3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg3)"/>

  <!-- Rundat V — tjock, vänlig stroke med rundade ändar -->
  <path d="M 280 280 L 512 700 L 744 280"
        stroke="url(#vfill3)" stroke-width="120"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Grön bock-streck under V:et, lite curved -->
  <path d="M 300 800 Q 512 880 724 800"
        stroke="#10b981" stroke-width="36"
        stroke-linecap="round" fill="none"/>
</svg>
