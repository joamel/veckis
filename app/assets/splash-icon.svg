<?xml version="1.0" encoding="UTF-8"?>
<!-- Splash-icon: motivet centrerat, ingen bakgrund (sätts via app.json
     splash.backgroundColor). Lite mer luft än adaptive-icon för att inte
     ta över hela splashen. -->
