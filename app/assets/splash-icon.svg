      <stop offset="0%" stop-color="#7c5fe8"/>
      <stop offset="100%" stop-color="#e972a3"/>
    </linearGradient>
  </defs>
  <g transform="translate(512 512) scale(0.78) translate(-512 -512)">
    <g fill="none" stroke-width="96" stroke-linecap="butt">
      <circle cx="512" cy="512" r="320" stroke="#4f46e5"
