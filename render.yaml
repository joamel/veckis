services:
  - type: web
    name: veckis-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build:shared && npm run db:generate --workspace=backend && npm run build --workspace=backend
    startCommand: npm run start:prod --workspace=backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"

  # PWA-frontend som statisk site. Build kör expo export --platform web och
  # publicerar dist/. SPA-rewrite gör att direct-URL till en route som inte
  # genererats (t.ex. /shopping/<id>) faller tillbaka till index.html, som
  # klient-side router sen läser path från.
  - type: web
    name: veckis-web
    env: static
    region: frankfurt
    rootDir: app
    buildCommand: npm install && npm run build:web
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /sw.js
        name: Service-Worker-Allowed
        value: /
      - path: /sw.js
        name: Cache-Control
        value: "public, max-age=0, must-revalidate"
      - path: /manifest.json
        name: Cache-Control
        value: "public, max-age=3600"
      - path: /_expo/static/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
